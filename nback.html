<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Backワーキングメモリ課題</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; line-height: 1.8; color: #172544; background-color: #EADFE4; }
        .stimulus { font-size: 100px; font-weight: bold; margin: 40px 0; color: #172544; }
        .guide { color: #666; font-size: 1rem; margin-bottom: 10px; }
        .jspsych-btn { padding: 15px 30px !important; font-size: 1.2rem !important; min-width: 120px; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; color: #172544; }
        th { background-color: #f4f4f4; }
        .red-note { color: #d32f2f; font-size: 0.9rem; font-weight: bold; margin-top: 10px; }
        .highlight { color: #5384F1; font-weight: bold; }
        .summary-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1c8cc; }
    </style>
</head>
<body></body>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2QH_3KTMNOHHYPsEq-4a-v-wYY4RfXMfwoa4EMPQ48RQlY6dkU6M72Xbw7jiUIeo/exec';
    
    const jsPsych = initJsPsych({
        on_finish: function() {
            const display = jsPsych.getDisplayElement();
            display.innerHTML = "<h2>データを送信中です...</h2>";

            const allData = jsPsych.data.get().filter(d => d.condition).values();
            const pid = jsPsych.data.get().filter({trial_type: 'survey-text'}).values()[0]?.response.pid || "unknown";
            const testDate = new Date().toLocaleString();
            
            const payload = allData.map(d => ({
                participant: pid,
                date: testDate,
                condition: d.condition || "",
                trial_index: d.trial_index || 0,
                char: d.char || "",
                correct: String(d.correct),
                rt: Math.round(d.rt || 0),
                target_condition: d.target_condition || "",
                participant_answer: d.participant_answer || ""
            }));

            // 正答率の計算関数
            const calcAccuracy = (cond) => {
                const trials = allData.filter(d => d.condition === cond);
                const correctCount = trials.filter(d => d.correct === true).length;
                return trials.length > 0 ? ((correctCount / trials.length) * 100).toFixed(1) : 0;
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).finally(() => {
                let html = `<h2>実験終了。ご協力ありがとうございました。</h2>
                <div class="summary-box">
                    <strong>正答率:</strong><br>
                    1-Back: ${calcAccuracy('1-back')}% / 2-Back: ${calcAccuracy('2-back')}%
                </div>
                <table><tr><th>条件</th><th>試行</th><th>文字</th><th>正解</th><th>回答</th><th>正誤</th><th>反応時間</th></tr>`;
                
                allData.forEach(d => {
                    html += `<tr><td>${d.condition}</td><td>${d.trial_index}</td><td>${d.char}</td><td>${d.target_condition}</td><td>${d.participant_answer}</td><td>${d.correct ? '○' : '×'}</td><td>${d.rt ? Math.round(d.rt) : '-'}</td></tr>`;
                });
                display.innerHTML = html;
            });
        }
    });

    const participant_info = {
        type: jsPsychSurveyText,
        questions: [{ prompt: "参加者IDを入力してください", name: "pid", required: true }],
        button_label: "開始"
    };

    function generateSequence(n) {
        const chars = ['A', 'B', 'C', 'D', 'E'];
        let targetFlags;
        let valid = false;

        while (!valid) {
            targetFlags = new Array(20 - n).fill(false);
            for(let i=0; i<6; i++) targetFlags[i] = true;
            for (let i = targetFlags.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [targetFlags[i], targetFlags[j]] = [targetFlags[j], targetFlags[i]];
            }
            valid = true;
            for (let i = 0; i < targetFlags.length - 1; i++) {
                if (targetFlags[i] && targetFlags[i+1]) valid = false;
            }
        }

        let sequence = [];
        for (let i = 0; i < n; i++) sequence.push(chars[Math.floor(Math.random() * chars.length)]);

        for (let i = 0; i < (20 - n); i++) {
            if (targetFlags[i]) {
                sequence.push(sequence[sequence.length - n]);
            } else {
                let next;
                do { 
                    next = chars[Math.floor(Math.random() * chars.length)]; 
                } while (next === sequence[sequence.length - n]);
                sequence.push(next);
            }
        }
        
        return sequence.map((char, index) => ({
            char: char,
            isTarget: index < n ? false : (char === sequence[index - n])
        }));
    }

    function createTrialBlock(data, condition) {
        let block = [];
        data.forEach((trial, index) => {
            block.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `<div class="guide">${condition === '1-back' ? '1つ前' : '2つ前'}の文字と同じですか？ (F:同じ / J:違う)</div><div class="stimulus" id="stim">${trial.char}</div>`,
                choices: ['同じ (F)', '違う (J)'],
                button_html: ['<button class="jspsych-btn" id="btn-0">同じ</button>', '<button class="jspsych-btn" id="btn-1">違う</button>'],
                response_ends_trial: false,
                trial_duration: 2000,
                on_load: function() {
                    setTimeout(() => { const el = document.getElementById('stim'); if (el) el.style.visibility = 'hidden'; }, 500);
                    this.handleKeyDownRef = (e) => {
                        let btn = (e.key === 'f') ? document.getElementById('btn-0') : (e.key === 'j') ? document.getElementById('btn-1') : null;
                        if (btn) btn.click();
                    };
                    document.addEventListener('keydown', this.handleKeyDownRef);
                },
                on_finish: function(data) {
                    document.removeEventListener('keydown', this.handleKeyDownRef);
                    const responseMap = { 0: true, 1: false };
                    data.condition = condition;
                    data.correct = (data.response !== null) ? (responseMap[data.response] === trial.isTarget) : false;
                    data.trial_index = index + 1;
                    data.char = trial.char;
                    data.target_condition = trial.isTarget ? "同じ" : "違う";
                    data.participant_answer = (data.response !== null) ? (responseMap[data.response] ? "同じ" : "違う") : "未回答";
                }
            });
        });
        return block;
    }

    const timeline = [participant_info];
    timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: "<h2>1-Back課題</h2><p>1つ前の文字と<span class='highlight'>同じなら『同じ』ボタン もしくはFキー</span>、<br>違うなら<span class='highlight'>『違う』ボタン もしくはJキー</span>を押してください。</p><p class='red-note'>※最初の1文字目は『違う』を選択してください</p>", choices: ["開始"] });
    timeline.push(...createTrialBlock(generateSequence(1), '1-back'));
    timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: "<h2>休憩</h2><p>前半終了です。次は『2-Back』課題です。<br>今見ている文字が『2つ前』に出た文字と<span class='highlight'>同じなら『同じ』ボタン もしくはFキー</span>、<br>違うなら<span class='highlight'>『違う』ボタン もしくはJキー</span>を押してください。</p><p class='red-note'>※最初の2文字目までは『違う』を選択してください</p>", choices: ["2-Backを開始"] });
    timeline.push(...createTrialBlock(generateSequence(2), '2-back'));
    jsPsych.run(timeline);
</script>
</html>
