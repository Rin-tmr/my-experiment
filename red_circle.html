<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsPsych Experiment</title>
    <!-- jsPsych 7系 CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* 1. 背景色を灰色に設定 */
        body, .jspsych-display-element {
            background-color: #808080;
            color: white; /* 文字色を白にして読みやすくする */
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        /* 2. 直径100pxの赤い円のスタイル */
        .red-circle {
            width: 100px;
            height: 100px;
            background-color: #ff0000;
            border-radius: 50%;
            margin: 0 auto; /* 中央揃え用 */
        }

        /* 中央配置の調整 */
        .jspsych-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        /**
         * jsPsychの初期化
         */
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // 必要に応じて終了後の処理を記述
            }
        });

        // タイムラインの配列
        const timeline = [];

        /**
         * 試行: 赤い円を表示
         * 3. スペースキーが押されるまで表示し続ける
         */
        const trial_circle = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="red-circle"></div>',
            choices: [' '], // スペースキーのみ受け付け
            prompt: '<p style="margin-top: 20px;">スペースキーを押すと終了します</p>'
        };
        timeline.push(trial_circle);

        /**
         * 4. 終了メッセージの表示
         */
        const trial_end = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<h2>実験が終了しました。</h2><p>お疲れ様でした。</p>',
            choices: "NO_KEYS", // キー入力を受け付けない（提示のみ）
            trial_duration: 3000 // 3秒間表示して終了
        };
        timeline.push(trial_end);

        /**
         * 実験の開始
         */
        window.onload = function() {
            jsPsych.run(timeline);
        };
    </script>
</body>
</html>
