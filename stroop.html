<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - Random 10 trials</title>
    <script src="https://unpkg.com/jspsych@7.3.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.1"></script>
    <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .stimulus-text {
            font-size: 72px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .instruction-box {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 600px;
            text-align: center;
        }
        .instruction-text {
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .key-hint {
            display: inline-block;
            padding: 2px 8px;
            background: #e2e8f0;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
        .results-table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        .results-table td {
            padding: 8px 16px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <script>
        const jsPsych = initJsPsych({
            on_finish: function() {
                // 実験終了時にデータを表示（デバッグ用）
                // jsPsych.data.displayData();
            }
        });

        let timeline = [];

        // 1. 開始ボタン画面
        const start_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <div class="instruction-box">
                    <h2 style="margin-top:0;">ストループ課題</h2>
                    <p class="instruction-text">
                        これから合計10回のテストを行います。<br>
                        準備ができたら下のボタンを押してください。
                    </p>
                </div>
            `,
            choices: ['実験を開始する']
        };
        timeline.push(start_screen);

        // 2. 教示画面
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-box">
                    <p class="instruction-text">
                        表示される文字の<strong>「色」</strong>を答えてください。<br><br>
                        <span style="color:red; font-weight:bold;">赤色</span>なら <span class="key-hint">R</span> キー<br>
                        <span style="color:blue; font-weight:bold;">青色</span>なら <span class="key-hint">B</span> キー<br>
                        <span style="color:green; font-weight:bold;">緑色</span>なら <span class="key-hint">G</span> キー<br><br>
                        <strong>スペースキー</strong>を押すと開始します。
                    </p>
                </div>
            `,
            choices: [' ']
        };
        timeline.push(instructions);

        const stimuli = [
            { word: "赤", color: "red", correct_key: "r", type: "congruent" },
            { word: "青", color: "blue", correct_key: "b", type: "congruent" },
            { word: "緑", color: "green", correct_key: "g", type: "congruent" },
            { word: "赤", color: "blue", correct_key: "b", type: "incongruent" },
            { word: "赤", color: "green", correct_key: "g", type: "incongruent" },
            { word: "青", color: "red", correct_key: "r", type: "incongruent" },
            { word: "青", color: "green", correct_key: "g", type: "incongruent" },
            { word: "緑", color: "red", correct_key: "r", type: "incongruent" },
            { word: "緑", color: "blue", correct_key: "b", type: "incongruent" }
        ];

        // 4. 注視点
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div style="font-size: 60px; color: #94a3b8;">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500
        };

        // 5. メイン試行
        const test_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                return `<div class="stimulus-text" style="color: ${jsPsych.timelineVariable('color')};">
                            ${jsPsych.timelineVariable('word')}
                        </div>`;
            },
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                correct_key: jsPsych.timelineVariable('correct_key'),
                condition: jsPsych.timelineVariable('type')
            },
            on_finish: function(data) {
                // 正誤判定
                data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_key);
            }
        };

        // 6. 試行手続き: ここで10回ランダムに抽出する設定を行います
        const trial_procedure = {
            timeline: [fixation, test_trial],
            timeline_variables: stimuli,
            randomize_order: true,
            sample: {
                type: 'with-replacement', // 復元抽出（同じ刺激が再度選ばれることを許容）
                size: 10                  // 合計10回
            },
            post_trial_gap: 1000
        };
        timeline.push(trial_procedure);

        // 7. 結果表示画面
        const feedback_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <div class="instruction-box">
                    <h2>お疲れ様でした！</h2>
                </div>
            `,
            choices: ['終了する']
        };
        timeline.push(feedback_screen);

        // 実験開始
        jsPsych.run(timeline);
    </script>
</body>
</html>
