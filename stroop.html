<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task Experiment</title>
    <!-- jsPsych v7.3 ライブラリとプラグインの読み込み (修正版CDN) -->
    <!-- jsPsych本体 -->
    <script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/dist/index.browser.min.js"></script>
    <!-- 各プラグイン: v7では個別のパッケージから取得する必要があります -->
    <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-fullscreen@1.2.1/dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css">
    
    <style>
        body {
            background-color: #FFFFFF; /* 背景色: 白 */
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
        }

        .instruction-text {
            font-size: 24px;
            line-height: 1.6;
            text-align: left;
            display: inline-block;
        }

        .stroop-stimulus {
            font-size: 60px;
            font-weight: bold;
        }

        .fixation {
            font-size: 60px;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        const jsPsych = initJsPsych({
            on_finish: function() {
                jsPsych.data.displayData('csv');
            }
        });

        const stimuli = [
            { word: "赤", color: "red", condition: "congruent", correct_key: "r" },
            { word: "青", color: "blue", condition: "congruent", correct_key: "b" },
            { word: "緑", color: "green", condition: "congruent", correct_key: "g" },
            { word: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
            { word: "赤", color: "green", condition: "incongruent", correct_key: "g" },
            { word: "青", color: "red", condition: "incongruent", correct_key: "r" },
            { word: "青", color: "green", condition: "incongruent", correct_key: "g" },
            { word: "緑", color: "red", condition: "incongruent", correct_key: "r" },
            { word: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
        ];

        const test_stimuli = jsPsych.randomization.sampleWithReplacement(stimuli, 10);
        const timeline = [];

        /* 
           注意: ブラウザのセキュリティポリシーにより、iframe内での全画面化が制限されているため
           fullscreen_mode の追加をコメントアウトしました。
        */
        /*
        const fullscreen_mode = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            button_label: "全画面表示で開始する",
            delay_after: 500
        };
        timeline.push(fullscreen_mode);
        */

        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>文字の『色』をキーボードで答えてください。</p>
                    <p>赤色なら <strong style="color:red"> 'r' </strong></p>
                    <p>青色なら <strong style="color:blue"> 'b' </strong></p>
                    <p>緑色なら <strong style="color:green"> 'g' </strong></p>
                    <br>
                    <p>スペースキーで開始します。</p>
                </div>
            `,
            choices: [' '],
            post_trial_gap: 1000
        };
        timeline.push(instructions);

        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500,
            data: { task: 'fixation' }
        };

        const test_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                // jsPsych.evaluateTimelineVariable を jsPsych.timelineVariable に修正
                return `<div class="stroop-stimulus" style="color: ${jsPsych.timelineVariable('color')};">
                            ${jsPsych.timelineVariable('word')}
                        </div>`;
            },
            choices: ['r', 'g', 'b'],
            data: {
                task: 'response',
                correct_response: jsPsych.timelineVariable('correct_key'),
                condition: jsPsych.timelineVariable('condition')
            },
            on_finish: function(data) {
                data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
            }
        };

        const iti = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            choices: "NO_KEYS",
            trial_duration: 1000,
            data: { task: 'iti' }
        };

        const trial_procedure = {
            timeline: [fixation, test_trial, iti],
            timeline_variables: test_stimuli
        };
        timeline.push(trial_procedure);

        jsPsych.run(timeline);

    </script>
</body>
</html>
